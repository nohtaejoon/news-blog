## 문의하기

아래 정보를 통해 사이트 운영자에게 연락하실 수 있습니다. 이 페이지는 예시용으로 작성되었으며 실제 응답은 백엔드가 제공될 때까지 제한적일 수 있습니다.

<form action="#" method="post" aria-label="contact form">
  <label for="name">이름</label><br>
  <input type="text" id="name" name="name" placeholder="홍길동" required style="width:100%;max-width:600px;padding:0.5rem;border:1px solid #ccc;border-radius:4px"><br><br>

  <label for="email">이메일</label><br>
  <input type="email" id="email" name="email" placeholder="name@example.com" required style="width:100%;max-width:600px;padding:0.5rem;border:1px solid #ccc;border-radius:4px"><br><br>

  <label for="message">메시지</label><br>
  <textarea id="message" name="message" rows="6" placeholder="문의 내용을 입력하세요" required style="width:100%;max-width:600px;padding:0.5rem;border:1px solid #ccc;border-radius:4px"></textarea><br><br>

  <button type="submit" style="padding:0.6rem 1rem;border-radius:4px;border:1px solid #007acc;background:#007acc;color:white">전송</button>
</form>
