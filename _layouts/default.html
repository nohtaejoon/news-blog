<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-PLACEHOLDER');
    </script>
    <!-- AdSense Placeholder -->
    <script data-ad-client="ca-pub-4458542389487813" async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
  </head>
  <body>
  <header class="site-header" role="banner">
      <nav class="site-nav" aria-label="Main navigation">
        <a class="logo" href="{{ '/' | relative_url }}">News Blog</a>
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/about/' | relative_url }}">About</a></li>
          <li><a href="{{ '/privacy/' | relative_url }}">개인정보처리방침</a></li>
          <li><a href="{{ '/contact/' | relative_url }}">문의</a></li>
        </ul>
      </nav>
    </header>
    <main class="site-content" role="main">
      {{ content }}
    </main>
    <footer class="site-footer" role="contentinfo">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </footer>
  </body>
  </html>
